<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كافتيريا الربيع - Al-Rabi' Cafeteria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap');
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #fdfaf5;
            color: #2c2c2c;
            scroll-behavior: smooth;
        }
        .hero-bg {
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&q=80&w=2070');
            background-size: cover;
            background-position: center;
        }
        .menu-item-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .menu-item-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 30px -5px rgba(0, 0, 0, 0.1);
        }
        .price-tag {
            background: #c2410c;
            color: white;
            padding: 6px 15px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1rem;
        }
        .section-title {
            position: relative;
            display: inline-block;
            margin-bottom: 2rem;
        }
        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            right: 0;
            height: 4px;
            background: #c2410c;
            border-radius: 2px;
        }
        /* Tab Styles */
        .tab-btn {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .tab-btn.active {
            background-color: #c2410c;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 10px 15px -3px rgba(194, 65, 12, 0.4);
        }
        .menu-category-content {
            display: none;
            animation: fadeInUp 0.5s ease forwards;
        }
        .menu-category-content.active {
            display: block;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .category-badge {
            background: #fff7ed;
            color: #c2410c;
            padding: 2px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 10px;
            display: inline-block;
        }
    </style>
</head>
<body class="bg-stone-50">

                    <a href="#contact" class="text-stone-700 hover:text-orange-800 font-bold transition-colors">اتصل بنا</a>
                </div>
                <div class="md:hidden">

                </div>
            </div>
        </div>
    </nav>

                        <i class="fas fa-utensils ml-3"></i> استكشف المنيو
                    </a>
                </div>
            </div>
        </div>
    </section>
